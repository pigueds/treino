<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RN Treino</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,400&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#0d0d0f;--s1:#141416;--s2:#1c1c20;--s3:#242428;--border:#2e2e34;--red:#c41e1e;--red2:#e02020;--accent:#e8ff47;--text:#f0f0f0;--muted:#6a6a75;--muted2:#3a3a42;--r:12px}
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;overflow-x:hidden}
.screen{display:none;min-height:100vh;flex-direction:column;animation:fi .3s ease}
.screen.active{display:flex}
@keyframes fi{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
/* HEADER */
.hdr{display:flex;align-items:center;justify-content:space-between;padding:14px 20px;border-bottom:1px solid var(--border);background:rgba(13,13,15,.95);backdrop-filter:blur(12px);position:sticky;top:0;z-index:100}
.logo-img{height:38px;object-fit:contain}
.hdr-title{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:2px;color:var(--red2)}
.back-btn{background:var(--s2);border:1px solid var(--border);color:var(--text);padding:7px 14px;border-radius:8px;cursor:pointer;font-size:13px;font-family:'DM Sans',sans-serif;transition:all .2s}
.back-btn:hover{border-color:var(--red2);color:var(--red2)}
/* HOME */
#sc-home{background:radial-gradient(ellipse at 50% -20%,#2a0808 0%,var(--bg) 65%)}
.hero{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 24px;text-align:center;gap:28px}
.hero-logo{width:220px;filter:drop-shadow(0 8px 32px rgba(196,30,30,.4))}
.hero h1{font-family:'Bebas Neue',sans-serif;font-size:clamp(52px,12vw,88px);line-height:.9;letter-spacing:3px}
.hero h1 em{color:var(--red2);font-style:normal}
.hero p{font-size:15px;color:var(--muted);max-width:380px;line-height:1.65}
.btn-red{background:var(--red2);color:#fff;font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:2px;padding:15px 44px;border:none;border-radius:var(--r);cursor:pointer;transition:all .2s;width:100%;max-width:320px}
.btn-red:hover{background:#ff2828;transform:translateY(-2px);box-shadow:0 8px 28px rgba(224,32,32,.4)}
/* FOCUS */
.page{flex:1;padding:28px 20px 100px;max-width:600px;margin:0 auto;width:100%}
.pg-title{font-family:'Bebas Neue',sans-serif;font-size:34px;letter-spacing:2px;margin-bottom:4px}
.pg-sub{color:var(--muted);font-size:13px;margin-bottom:24px}
.focus-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.fc{background:var(--s1);border:2px solid var(--border);border-radius:var(--r);padding:18px 14px;cursor:pointer;transition:all .2s;display:flex;flex-direction:column;gap:8px;position:relative}
.fc:hover{border-color:var(--s3);transform:translateY(-2px)}
.fc.sel{border-color:var(--red2);background:rgba(224,32,32,.07)}
.fc-icon{font-size:26px}
.fc-name{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:1px}
.fc-desc{font-size:11px;color:var(--muted);line-height:1.4}
.fc-chk{width:20px;height:20px;border-radius:50%;background:var(--red2);display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity .2s;position:absolute;top:12px;right:12px;font-size:11px;font-weight:700;color:#fff}
.fc.sel .fc-chk{opacity:1}
/* PLAN */
.plan-banner{background:linear-gradient(135deg,var(--red) 0%,#8b0000 100%);border-radius:var(--r);padding:18px 20px;margin-bottom:20px;display:flex;justify-content:space-between;align-items:center}
.plan-name{font-family:'Bebas Neue',sans-serif;font-size:48px;color:#fff;letter-spacing:4px;line-height:1}
.plan-info{text-align:right;color:rgba(255,255,255,.8)}
.plan-info .lbl{font-size:10px;text-transform:uppercase;letter-spacing:1.5px;font-family:'Space Mono',monospace}
.plan-info .val{font-size:16px;font-weight:600;color:#fff;margin-top:1px}
.week-toggle{display:flex;gap:6px;margin-bottom:20px}
.wt-btn{flex:1;padding:10px;border-radius:8px;border:2px solid var(--border);background:var(--s1);color:var(--muted);font-size:13px;font-family:'DM Sans',sans-serif;cursor:pointer;transition:all .2s;text-align:center}
.wt-btn.active{border-color:var(--red2);color:var(--red2);background:rgba(224,32,32,.08)}
.day-tabs{display:flex;gap:6px;margin-bottom:20px;overflow-x:auto;padding-bottom:4px}
.day-tabs::-webkit-scrollbar{height:2px}
.day-tabs::-webkit-scrollbar-thumb{background:var(--muted2)}
.dt{background:var(--s1);border:2px solid var(--border);color:var(--muted);padding:9px 14px;border-radius:8px;cursor:pointer;font-family:'Bebas Neue',sans-serif;font-size:16px;letter-spacing:1px;white-space:nowrap;transition:all .2s}
.dt:hover:not(.active){border-color:var(--muted2);color:var(--text)}
.dt.active{border-color:var(--red2);color:var(--red2);background:rgba(224,32,32,.08)}
.day-title{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:2px;color:var(--red2);margin-bottom:4px;text-transform:uppercase}
.week-note{background:rgba(232,255,71,.07);border:1px solid rgba(232,255,71,.2);border-radius:8px;padding:10px 14px;margin-bottom:16px;font-size:12px;color:var(--accent);line-height:1.5}
.week-note strong{display:block;margin-bottom:2px;font-family:'Space Mono',monospace;letter-spacing:1px;font-size:11px}
/* EXERCISE CARD */
.ex-card{background:var(--s1);border:1px solid var(--border);border-radius:var(--r);padding:14px;margin-bottom:8px;display:flex;align-items:center;gap:12px;cursor:pointer;transition:all .2s}
.ex-card:hover{border-color:var(--s3);background:var(--s2);transform:translateX(3px)}
.ex-badge{background:var(--s2);border:1px solid var(--border);border-radius:8px;padding:7px 10px;min-width:64px;text-align:center;flex-shrink:0}
.ex-badge .st{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:1px}
.ex-badge .sv{font-family:'Space Mono',monospace;font-size:11px;color:var(--red2);font-weight:700;margin-top:2px;line-height:1.2;word-break:break-word}
.ex-body{flex:1;min-width:0}
.ex-name{font-weight:600;font-size:14px;margin-bottom:2px;line-height:1.3}
.ex-detail{font-size:11px;color:var(--muted)}
.ex-load-col{text-align:right;flex-shrink:0}
.load-val{font-family:'Space Mono',monospace;font-size:16px;font-weight:700;color:var(--accent)}
.load-u{font-size:10px;color:var(--muted)}
.load-empty{font-size:11px;color:var(--muted2)}
.ex-arr{color:var(--muted2);font-size:16px;flex-shrink:0}
.muscle-lbl{font-family:'Space Mono',monospace;font-size:10px;letter-spacing:2px;color:var(--red2);text-transform:uppercase;margin:18px 0 8px}
/* MODAL */
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:200;align-items:flex-end;justify-content:center;backdrop-filter:blur(4px)}
.overlay.open{display:flex}
.modal{background:var(--s1);border:1px solid var(--border);border-radius:20px 20px 0 0;width:100%;max-width:600px;max-height:90vh;overflow-y:auto;padding:24px 20px 44px;animation:su .28s ease}
@keyframes su{from{transform:translateY(50px);opacity:0}to{transform:translateY(0);opacity:1}}
.modal-handle{width:36px;height:4px;background:var(--muted2);border-radius:2px;margin:0 auto 20px}
.modal-title{font-family:'Bebas Neue',sans-serif;font-size:28px;letter-spacing:2px;margin-bottom:3px}
.modal-muscle{font-family:'Space Mono',monospace;font-size:11px;color:var(--red2);letter-spacing:1.5px;margin-bottom:18px}
.msec{margin-bottom:18px}
.msec-title{font-family:'Space Mono',monospace;font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:1.5px;margin-bottom:8px}
.sets-row{display:flex;gap:8px;flex-wrap:wrap}
.set-pill{background:var(--s2);border:1px solid var(--border);border-radius:8px;padding:8px 12px;text-align:center}
.set-pill .sn{font-size:10px;color:var(--muted)}
.set-pill .sr{font-family:'Space Mono',monospace;font-size:13px;color:var(--text);font-weight:700;margin-top:1px}
.interval-pill{background:rgba(196,30,30,.12);border:1px solid rgba(196,30,30,.3);border-radius:8px;padding:8px 14px;font-family:'Space Mono',monospace;font-size:13px;color:var(--red2)}
.desc-text{font-size:13px;color:#bbbbc4;line-height:1.7}
.yt-btn{display:flex;align-items:center;gap:10px;background:#cc0000;color:#fff;border:none;border-radius:var(--r);padding:13px 18px;width:100%;cursor:pointer;font-size:14px;font-weight:600;font-family:'DM Sans',sans-serif;transition:opacity .2s;text-decoration:none;margin-bottom:18px}
.yt-btn:hover{opacity:.85}
.yt-icon{font-size:20px}
/* LOAD SECTION */
.load-box{background:var(--s2);border:1px solid var(--border);border-radius:var(--r);padding:16px}
.load-row{display:flex;gap:10px;margin-top:10px}
.load-inp{flex:1;background:var(--bg);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:'Space Mono',monospace;font-size:18px;padding:11px 14px;outline:none;transition:border-color .2s}
.load-inp:focus{border-color:var(--red2)}
.load-inp::placeholder{color:var(--muted2);font-size:14px}
.save-btn{background:var(--red2);color:#fff;border:none;border-radius:8px;padding:11px 18px;font-family:'Bebas Neue',sans-serif;font-size:17px;letter-spacing:1px;cursor:pointer;transition:all .2s;white-space:nowrap}
.save-btn:hover{background:#ff2828}
.load-hist{margin-top:12px}
.hist-item{display:flex;justify-content:space-between;align-items:center;font-size:12px;color:var(--muted);padding:6px 0;border-bottom:1px solid var(--border)}
.hist-item:last-child{border-bottom:none}
.del-btn{background:none;border:none;color:var(--muted2);cursor:pointer;font-size:14px;padding:2px 6px;border-radius:4px;transition:color .2s}
.del-btn:hover{color:#ff4444}
/* PROGRESS */
.stats-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:20px}
.stat-c{background:var(--s1);border:1px solid var(--border);border-radius:var(--r);padding:14px;text-align:center}
.stat-v{font-family:'Bebas Neue',sans-serif;font-size:26px;color:var(--red2)}
.stat-l{font-size:10px;color:var(--muted);margin-top:1px;text-transform:uppercase;letter-spacing:1px;font-family:'Space Mono',monospace}
.prog-tabs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:20px}
.pt-btn{background:var(--s1);border:1px solid var(--border);color:var(--muted);padding:7px 14px;border-radius:8px;cursor:pointer;font-size:12px;transition:all .2s}
.pt-btn.active{border-color:var(--red2);color:var(--red2);background:rgba(224,32,32,.08)}
.chart-box{background:var(--s1);border:1px solid var(--border);border-radius:var(--r);padding:18px;margin-bottom:16px}
.chart-title{font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:1px;margin-bottom:2px}
.chart-sub{font-size:11px;color:var(--muted);margin-bottom:14px}
.no-data{text-align:center;color:var(--muted);font-size:14px;padding:48px 0}
/* BOTTOM NAV */
.bnav{display:none;position:fixed;bottom:0;left:0;right:0;background:rgba(13,13,15,.96);border-top:1px solid var(--border);padding:10px 20px 20px;backdrop-filter:blur(16px);z-index:99}
.bnav.vis{display:flex;justify-content:space-around}
.ni{display:flex;flex-direction:column;align-items:center;gap:4px;cursor:pointer;color:var(--muted);transition:color .2s;padding:4px 18px;border-radius:8px}
.ni.active{color:var(--red2)}
.ni-icon{font-size:20px}
.ni-lbl{font-size:10px;font-family:'Space Mono',monospace;letter-spacing:1px}
body.hasnav{padding-bottom:80px}
/* USERS */
.user-grid{display:flex;flex-direction:column;gap:10px;margin-bottom:24px}
.user-card{background:var(--s1);border:2px solid var(--border);border-radius:var(--r);padding:16px 18px;cursor:pointer;transition:all .2s;display:flex;align-items:center;gap:14px}
.user-card:hover{border-color:var(--red2)}
.user-av{width:44px;height:44px;border-radius:50%;background:var(--red2);display:flex;align-items:center;justify-content:center;font-family:'Bebas Neue',sans-serif;font-size:22px;color:#fff;flex-shrink:0}
.user-info .un{font-weight:600;font-size:15px}
.user-info .us{font-size:12px;color:var(--muted);margin-top:2px}
.add-user-form{background:var(--s1);border:1px solid var(--border);border-radius:var(--r);padding:18px;margin-bottom:20px}
.form-input{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:15px;padding:12px 14px;outline:none;transition:border-color .2s;margin-top:8px;display:block}
.form-input:focus{border-color:var(--red2)}
.form-label{font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;font-family:'Space Mono',monospace}
.del-user-btn{background:none;border:none;color:var(--muted2);cursor:pointer;font-size:16px;margin-left:auto;padding:4px 8px;border-radius:6px;transition:color .2s}
.del-user-btn:hover{color:#ff4444}
</style>
</head>
<body>
<!-- HOME -->
<div id="sc-home" class="screen active">
  <div class="hdr"><img class="logo-img" id="logo-home" src="" alt="RN Treino"><div style="font-family:'Space Mono',monospace;font-size:11px;color:var(--muted);letter-spacing:2px">CONSULTORIA ESPORTIVA</div></div>
  <div class="hero">
    <img class="hero-logo" id="logo-hero" src="" alt="Ricardo Nascimento">
    <h1>RN<br><em>TREINO</em></h1>
    <p>Planos de treino intermediário/avançado baseados na metodologia do Ricardo Nascimento.</p>
    <button class="btn-red" onclick="goTo('sc-users')">COMEÇAR →</button>
  </div>
</div>

<!-- USERS -->
<div id="sc-users" class="screen">
  <div class="hdr"><img class="logo-img" id="logo-users" src="" alt="RN"><div class="hdr-title">PERFIS</div><button class="back-btn" onclick="goTo('sc-home')">← Início</button></div>
  <div class="page">
    <div class="pg-title">SELECIONE</div>
    <div class="pg-sub">Escolha um perfil ou crie um novo</div>
    <div class="user-grid" id="user-list"></div>
    <div class="add-user-form" id="add-form" style="display:none">
      <span class="form-label">Nome do perfil</span>
      <input class="form-input" id="new-user-name" placeholder="Ex: João, Maria..." maxlength="24">
      <div style="display:flex;gap:8px;margin-top:12px">
        <button class="btn-red" style="padding:11px 20px;font-size:17px" onclick="createUser()">CRIAR</button>
        <button class="back-btn" onclick="document.getElementById('add-form').style.display='none'">Cancelar</button>
      </div>
    </div>
    <button class="btn-red" onclick="document.getElementById('add-form').style.display='block';document.getElementById('new-user-name').focus()">+ NOVO PERFIL</button>
  </div>
</div>

<!-- FOCUS -->
<div id="sc-focus" class="screen">
  <div class="hdr"><img class="logo-img" id="logo-focus" src="" alt="RN"><div class="hdr-title" id="focus-user-name">FOCO</div><button class="back-btn" onclick="goTo('sc-users')">← Perfis</button></div>
  <div class="page">
    <div class="pg-title">ESCOLHA O FOCO</div>
    <div class="pg-sub">Selecione 1 grupo para ênfase nas 8 semanas</div>
    <div class="focus-grid" id="focus-grid"></div>
    <button class="btn-red" style="margin-top:24px" onclick="buildPlan()">GERAR TREINO →</button>
  </div>
</div>

<!-- PLAN -->
<div id="sc-plan" class="screen">
  <div class="hdr"><img class="logo-img" id="logo-plan" src="" alt="RN"><div class="hdr-title" id="plan-user-lbl">TREINO</div><button class="back-btn" onclick="goTo('sc-focus')">← Foco</button></div>
  <div class="page" id="plan-page"></div>
</div>

<!-- PROGRESS -->
<div id="sc-prog" class="screen">
  <div class="hdr"><img class="logo-img" id="logo-prog" src="" alt="RN"><div class="hdr-title" id="prog-user-lbl">EVOLUÇÃO</div></div>
  <div class="page" id="prog-page"></div>
</div>

<!-- MODAL -->
<div class="overlay" id="overlay" onclick="closeModal(event)">
  <div class="modal" id="modal"><div class="modal-handle"></div><div id="modal-body"></div></div>
</div>

<!-- BOTTOM NAV -->
<div class="bnav" id="bnav">
  <div class="ni active" id="ni-treino" onclick="switchTab('sc-plan','ni-treino')"><div class="ni-icon">🏋️</div><div class="ni-lbl">TREINO</div></div>
  <div class="ni" id="ni-prog" onclick="switchTab('sc-prog','ni-prog')"><div class="ni-icon">📈</div><div class="ni-lbl">EVOLUÇÃO</div></div>
</div>

         {id:'supino-decl-b5',nome:'Supino Declinado Barra ou Máquina', serie:'PIRÂMIDE',   intervalo:'1,5 a 3 min', musculo:'Peitoral Inferior', desc:'Foca peitoral inferior.', yt:'https://www.youtube.com/results?search_query=supino+declinado+execucao'},
         {id:'fly-maq-b5',  nome:'Fly Máquina',                         serie:'3x8-12',     intervalo:'45s a 1,5 min',musculo:'Peitoral', desc:'Isolamento. Contração máxima no final.', yt:'https://www.youtube.com/results?search_query=fly+maquina+peitoral'},
         {id:'tric-pol-b5', nome:'Tríceps Polia Alta',                  serie:'PIRÂMIDE',   intervalo:'1 a 2 min',   musculo:'Tríceps', desc:'Na polia alta. Cotovelos fixos ao corpo.', yt:'https://www.youtube.com/results?search_query=triceps+polia+alta'},
         {id:'tric-test-b5',nome:'Tríceps Testa Barra "W"',            serie:'4x8-12',     intervalo:'1 a 2 min',   musculo:'Tríceps', desc:'Deitado com barra W. Estiramento da cabeça longa.', yt:'https://www.youtube.com/results?search_query=triceps+testa+barra+W'},
       ]},
    ],
  },
};

// ── STATE ─────────────────────────────────────
let state={users:[],curUser:null,loads:{},plan:null,activeDay:0,activeWeek:'1',curEx:null,curMuscle:null};
function save(){localStorage.setItem('rn_state',JSON.stringify(state))}
function load(){const d=localStorage.getItem('rn_state');if(d)state={...state,...JSON.parse(d)}}

// ── INIT ──────────────────────────────────────
load();
document.querySelectorAll('img[src=""]').forEach(i=>i.src='data:image/jpeg;base64,'+LOGO_B64);

// ── NAV ───────────────────────────────────────
function goTo(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  const bnav=document.getElementById('bnav');
  const hasnav=id==='sc-plan'||id==='sc-prog';
  bnav.classList.toggle('vis',hasnav);
  document.body.classList.toggle('hasnav',hasnav);
  if(id==='sc-prog')renderProg();
}
function switchTab(scId,niId){
  goTo(scId);
  document.querySelectorAll('.ni').forEach(n=>n.classList.remove('active'));
  document.getElementById(niId).classList.add('active');
}

// ── USERS ─────────────────────────────────────
function renderUsers(){
  const ul=document.getElementById('user-list');
  ul.innerHTML=state.users.map((u,i)=>`
    <div class="user-card" onclick="selectUser(${i})">
      <div class="user-av">${u.name[0].toUpperCase()}</div>
      <div class="user-info">
        <div class="un">${u.name}</div>
        <div class="us">${u.focus?FOCUSES.find(f=>f.id===u.focus)?.name+' — Semanas '+u.week:'Nenhum plano selecionado'}</div>
      </div>
      <button class="del-user-btn" onclick="event.stopPropagation();delUser(${i})">🗑</button>
    </div>`).join('')||'<div style="color:var(--muted);font-size:14px;padding:20px 0">Nenhum perfil criado ainda.</div>';
}
function createUser(){
  const n=document.getElementById('new-user-name').value.trim();
  if(!n)return;
  state.users.push({name:n,focus:null,week:'1'});
  if(!state.loads[state.users.length-1])state.loads[state.users.length-1]={};
  save();renderUsers();
  document.getElementById('add-form').style.display='none';
  document.getElementById('new-user-name').value='';
}
function delUser(i){
  if(!confirm('Excluir perfil "'+state.users[i].name+'"?'))return;
  delete state.loads[i];state.users.splice(i,1);save();renderUsers();
}
function selectUser(i){
  state.curUser=i;
  const u=state.users[i];
  document.getElementById('focus-user-name').textContent=u.name.toUpperCase();
  save();
  if(u.focus){
    state.plan=PLANS[u.focus];
    state.activeDay=0;
    state.activeWeek=u.week||'1';
    document.getElementById('plan-user-lbl').textContent=u.name.toUpperCase();
    document.getElementById('prog-user-lbl').textContent=u.name.toUpperCase();
    renderFocuses();
    renderPlan();
    goTo('sc-plan');
    document.getElementById('ni-treino').classList.add('active');
    document.getElementById('ni-prog').classList.remove('active');
  } else {
    renderFocuses();
    goTo('sc-focus');
  }
}

// ── FOCUSES ───────────────────────────────────
function renderFocuses(){
  document.getElementById('focus-grid').innerHTML=FOCUSES.map(f=>`
    <div class="fc${state.users[state.curUser]?.focus===f.id?' sel':''}" onclick="toggleFocus('${f.id}')">
      <div class="fc-icon">${f.icon}</div>
      <div class="fc-name">${f.name}</div>
      <div class="fc-desc">${f.desc}</div>
      <div class="fc-chk">✓</div>
    </div>`).join('');
}
function toggleFocus(id){
  state.users[state.curUser].focus=id;save();renderFocuses();
}
function buildPlan(){
  const u=state.users[state.curUser];
  if(!u.focus){alert('Selecione um foco!');return;}
  state.plan=PLANS[u.focus];state.activeDay=0;state.activeWeek='1';u.week='1';save();
  document.getElementById('plan-user-lbl').textContent=u.name.toUpperCase();
  document.getElementById('prog-user-lbl').textContent=u.name.toUpperCase();
  renderPlan();goTo('sc-plan');
  document.getElementById('ni-treino').classList.add('active');
  document.getElementById('ni-prog').classList.remove('active');
}

// ── PLAN ──────────────────────────────────────
function renderPlan(){
  const P=state.plan,W=state.activeWeek,di=state.activeDay,D=P.dias[di];
  const pg=document.getElementById('plan-page');
  const ld=state.loads[state.curUser]||{};
  const tabs=P.dias.map((d,i)=>`<div class="dt${i===di?' active':''}" onclick="setDay(${i})">${d.letra}</div>`).join('');
  const weekNote=W==='1'?`<strong>SEMANAS 1 A 4</strong>${P.semanas14}`:`<strong>SEMANAS 4 A 8</strong>${D.semana48}`;
  const exs=D.exercicios.map(ex=>{
    const h=ld[ex.id]?.history||[];const last=h.at(-1);
    return`<div class="ex-card" onclick="openModal('${ex.id}')">
      <div class="ex-badge"><div class="st">Série</div><div class="sv">${ex.serie}</div></div>
      <div class="ex-body"><div class="ex-name">${ex.nome}</div><div class="ex-detail">${ex.musculo} · ${ex.intervalo}</div></div>
      <div class="ex-load-col">${last?`<div class="load-val">${last.kg}</div><div class="load-u">kg</div>`:'<div class="load-empty">— kg</div>'}</div>
      <div class="ex-arr">›</div>
    </div>`;
  }).join('');
  pg.innerHTML=`
    <div class="plan-banner">
      <div><div class="plan-name">${P.label.split(' ')[0]}<br>${P.label.split(' ').slice(1).join(' ')}</div></div>
      <div class="plan-info"><div class="lbl">Programa</div><div class="val">8 SEMANAS</div><div class="lbl" style="margin-top:6px">5x Semana</div></div>
    </div>
    <div class="week-toggle">
      <div class="wt-btn${W==='1'?' active':''}" onclick="setWeek('1')">Semanas 1-4</div>
      <div class="wt-btn${W==='2'?' active':''}" onclick="setWeek('2')">Semanas 4-8</div>
    </div>
    <div class="day-tabs">${tabs}</div>
    <div class="day-title">${D.titulo}</div>
    <div class="week-note">${weekNote}</div>
    ${exs}`;
}
function setDay(i){state.activeDay=i;renderPlan();}
function setWeek(w){state.activeWeek=w;if(state.users[state.curUser])state.users[state.curUser].week=w;save();renderPlan();}

// ── MODAL ─────────────────────────────────────
function openModal(exId){
  const P=state.plan,D=P.dias[state.activeDay];
  const ex=D.exercicios.find(e=>e.id===exId);if(!ex)return;
  state.curEx=exId;
  const ld=state.loads[state.curUser]||{};
  const hist=(ld[exId]?.history)||[];
  const lastKg=hist.at(-1)?.kg||'';
  const histHTML=hist.length?hist.slice(-8).map((h,hi)=>`
    <div class="hist-item">
      <span>${h.date}</span>
      <span><strong style="color:var(--accent)">${h.kg} kg</strong></span>
      <button class="del-btn" onclick="delLoad('${exId}',${hi})" title="Excluir">✕</button>
    </div>`).join(''):'<div style="color:var(--muted2);font-size:12px;padding:6px 0">Nenhum registro ainda</div>';
  document.getElementById('modal-body').innerHTML=`
    <div class="modal-title">${ex.nome}</div>
    <div class="modal-muscle">${ex.musculo}</div>
    <div class="msec">
      <div class="msec-title">Série / Técnica</div>
      <div class="sets-row"><div class="set-pill"><div class="sn">Método</div><div class="sr">${ex.serie}</div></div>
      <div class="interval-pill">⏱ ${ex.intervalo}</div></div>
    </div>
    <div class="msec">
      <div class="msec-title">Execução</div>
      <div class="desc-text">${ex.desc}</div>
    </div>
    <a class="yt-btn" href="${ex.yt}" target="_blank"><span class="yt-icon">▶</span>Ver no YouTube</a>
    <div class="load-box">
      <div class="msec-title">Registrar Carga</div>
      <div class="load-row">
        <input class="load-inp" type="number" id="linp" placeholder="Ex: 60" value="${lastKg}" step="0.5" min="0">
        <button class="save-btn" onclick="saveLoad()">SALVAR</button>
      </div>
      <div class="load-hist" id="lhist">${histHTML}</div>
    </div>`;
  document.getElementById('overlay').classList.add('open');
}
function closeModal(e){
  if(e.target===document.getElementById('overlay')){
    document.getElementById('overlay').classList.remove('open');
    renderPlan();
  }
}
function saveLoad(){
  const kg=parseFloat(document.getElementById('linp').value);
  if(!kg||kg<=0){alert('Informe uma carga válida!');return;}
  if(!state.loads[state.curUser])state.loads[state.curUser]={};
  if(!state.loads[state.curUser][state.curEx])state.loads[state.curUser][state.curEx]={history:[]};
  const today=new Date().toLocaleDateString('pt-BR');
  state.loads[state.curUser][state.curEx].history.push({date:today,kg});
  save();
  // re-render history in modal
  const ld=state.loads[state.curUser][state.curEx];
  const hist=ld.history;
  document.getElementById('lhist').innerHTML=hist.slice(-8).map((h,hi)=>`
    <div class="hist-item">
      <span>${h.date}</span>
      <span><strong style="color:var(--accent)">${h.kg} kg</strong></span>
      <button class="del-btn" onclick="delLoad('${state.curEx}',${hi})" title="Excluir">✕</button>
    </div>`).join('');
}
function delLoad(exId,idx){
  if(!state.loads[state.curUser]?.[exId])return;
  state.loads[state.curUser][exId].history.splice(idx,1);
  save();
  const hist=state.loads[state.curUser][exId].history;
  document.getElementById('lhist').innerHTML=hist.length?hist.slice(-8).map((h,hi)=>`
    <div class="hist-item">
      <span>${h.date}</span>
      <span><strong style="color:var(--accent)">${h.kg} kg</strong></span>
      <button class="del-btn" onclick="delLoad('${exId}',${hi})" title="Excluir">✕</button>
    </div>`).join(''):'<div style="color:var(--muted2);font-size:12px;padding:6px 0">Nenhum registro ainda</div>';
}

// ── PROGRESS ──────────────────────────────────
let activeProgEx=null;
function renderProg(){
  const pg=document.getElementById('prog-page');
  const ld=state.loads[state.curUser]||{};
  pg.innerHTML='<div class="pg-title">EVOLUÇÃO</div><div class="pg-sub">Progressão de carga por exercício</div><div class="stats-grid" id="pg-stats"></div><div class="prog-tabs" id="pg-tabs"></div><div id="pg-chart"></div>';
  // collect exercises with data
  const P=state.plan;if(!P){pg.innerHTML+='<div class="no-data">Selecione um plano primeiro.</div>';return;}
  const withData=[];
  P.dias.forEach(d=>d.exercicios.forEach(ex=>{if(ld[ex.id]?.history?.length>0)withData.push(ex);}));
  // stats
  const total=Object.values(ld).reduce((a,l)=>a+(l.history?.length||0),0);
  const maxKg=withData.reduce((m,ex)=>{const h=ld[ex.id]?.history||[];return Math.max(m,...h.map(i=>i.kg));},0);
  document.getElementById('pg-stats').innerHTML=`
    <div class="stat-c"><div class="stat-v">${withData.length}</div><div class="stat-l">Exercícios</div></div>
    <div class="stat-c"><div class="stat-v">${total}</div><div class="stat-l">Registros</div></div>
    <div class="stat-c"><div class="stat-v">${maxKg||'—'}</div><div class="stat-l">Carga Máx</div></div>`;
  if(!withData.length){document.getElementById('pg-chart').innerHTML='<div class="no-data">📊 Nenhum registro ainda.<br>Registre cargas no treino!</div>';return;}
  if(!activeProgEx||!withData.find(e=>e.id===activeProgEx))activeProgEx=withData[0].id;
  document.getElementById('pg-tabs').innerHTML=withData.map(ex=>`<button class="pt-btn${ex.id===activeProgEx?' active':''}" onclick="selProgEx('${ex.id}')">${ex.nome}</button>`).join('');
  renderChart(withData.find(e=>e.id===activeProgEx),ld);
}
function selProgEx(id){activeProgEx=id;renderProg();}
function renderChart(ex,ld){
  const hist=ld[ex.id]?.history||[];
  const w=560,h=200,pad={t:20,r:20,b:38,l:44};
  const vals=hist.map(h=>h.kg);
  const minV=Math.min(...vals)*.92,maxV=Math.max(...vals)*1.06;
  const xs=pad.l,xe=w-pad.r,yw=xe-xs;
  const xStep=hist.length>1?yw/(hist.length-1):0;
  const yScale=v=>pad.t+(h-pad.t-pad.b)*(1-(v-minV)/(maxV-minV||1));
  const pts=hist.map((p,i)=>`${xs+i*xStep},${yScale(p.kg)}`).join(' ');
  const area=[`${xs},${h-pad.b}`,...hist.map((p,i)=>`${xs+i*xStep},${yScale(p.kg)}`),`${xs+(hist.length-1)*xStep},${h-pad.b}`].join(' ');
  const yticks=Array.from({length:5},(_,i)=>{const v=minV+i*(maxV-minV)/4;const y=yScale(v);return`<line x1="${xs}" y1="${y}" x2="${xe}" y2="${y}" stroke="#242428"/><text x="${xs-6}" y="${y+4}" fill="#6a6a75" font-size="10" text-anchor="end" font-family="monospace">${Math.round(v)}</text>`;}).join('');
  const xlabels=hist.map((p,i)=>{if(hist.length<=5||i%(Math.ceil(hist.length/5))===0)return`<text x="${xs+i*xStep}" y="${h-pad.b+16}" fill="#6a6a75" font-size="9" text-anchor="middle" font-family="monospace">${p.date.slice(0,5)}</text>`;return'';}).join('');
  const dots=hist.map((p,i)=>`<circle cx="${xs+i*xStep}" cy="${yScale(p.kg)}" r="4" fill="#c41e1e" stroke="#0d0d0f" stroke-width="2"><title>${p.date}: ${p.kg}kg</title></circle>`).join('');
  let trend='';
  if(hist.length>1){const n=hist.length,xi=hist.map((_,i)=>i),yi=hist.map(h=>h.kg),mx=xi.reduce((a,b)=>a+b)/n,my=yi.reduce((a,b)=>a+b)/n,sl=xi.reduce((a,x,i)=>a+(x-mx)*(yi[i]-my),0)/xi.reduce((a,x)=>a+(x-mx)**2,.001),ic=my-sl*mx;trend=`<line x1="${xs}" y1="${yScale(ic)}" x2="${xs+(n-1)*xStep}" y2="${yScale(sl*(n-1)+ic)}" stroke="#e8ff47" stroke-width="1.5" stroke-dasharray="4,3" opacity=".6"/>`;}
  const gain=vals.length>1?((vals.at(-1)-vals[0])/vals[0]*100).toFixed(1):'—';
  document.getElementById('pg-chart').innerHTML=`
    <div class="chart-box">
      <div class="chart-title">${ex.nome}</div>
      <div class="chart-sub">${ex.musculo} · ${hist.length} registro${hist.length!==1?'s':''} · Evolução: <span style="color:${gain>0?'var(--accent)':'var(--red2)'}">${gain!=='—'?(gain>0?'+':'')+gain+'%':'—'}</span></div>
      <svg viewBox="0 0 ${w} ${h}" xmlns="http://www.w3.org/2000/svg" style="width:100%;height:auto">
        <defs><linearGradient id="ag" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#c41e1e" stop-opacity=".3"/><stop offset="100%" stop-color="#c41e1e" stop-opacity="0"/></linearGradient></defs>
        ${yticks}
        ${hist.length>1?`<polygon points="${area}" fill="url(#ag)"/><polyline points="${pts}" fill="none" stroke="#c41e1e" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round"/>`:''}
        ${trend}${dots}${xlabels}
      </svg>
    </div>`;
}

// ── BOOT ──────────────────────────────────────
renderUsers();
document.getElementById('new-user-name').addEventListener('keydown',e=>{if(e.key==='Enter')createUser();});
</script>
